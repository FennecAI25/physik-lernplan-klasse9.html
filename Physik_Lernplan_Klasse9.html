<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:15px}
.app{max-width:780px;margin:0 auto;padding:1.5rem 1rem 3rem}
h1{font-size:20px;font-weight:600;margin-bottom:4px}
.subtitle{font-size:13px;color:#666;margin-bottom:1.2rem}

.countdown{background:#fde8e8;border:1px solid #f5c6c6;border-radius:10px;padding:10px 16px;font-size:13px;color:#9B1C1C;margin-bottom:1.2rem;font-weight:500}

.tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border:1px solid #ddd;border-radius:10px;overflow:hidden;background:#fff}
.tab{flex:1;padding:10px 4px;font-size:12px;border:none;background:none;cursor:pointer;color:#666;border-right:1px solid #ddd;transition:background .15s;font-family:inherit}

.prog-wrap{margin-bottom:1.2rem}

.prog-bar{height:6px;background:#e5e5e5;border-radius:3px;overflow:hidden}

.day-card{background:#fff;border:1px solid #e5e5e5;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.day-header{display:flex;align-items:center;gap:7px;margin-bottom:10px;flex-wrap:wrap}

.b-th{background:#fef3e2;color:#854F0B}
.b-exam{background:#fde8e8;color:#9B1C1C;font-weight:700}
.day-title{font-weight:500;font-size:14px;flex:1;min-width:120px}
.done-btn{margin-left:auto;font-size:11px;border:1px solid #ddd;border-radius:20px;padding:3px 10px;background:none;cursor:pointer;color:#666;font-family:inherit}
.done-btn.done{background:#e8f5e9;color:#1a7c34;border-color:#a5d6a7}

.session{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.stime{color:#888;min-width:72px;font-size:12px;padding-top:3px}
.sblock{flex:1;border-radius:7px;padding:5px 10px;font-size:13px;line-height:1.5}

.answer ul{padding-left:1.2rem}

.quiz-meta{font-size:12px;color:#888;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.quiz-topic{font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;background:#ede9fe;color:#5b21b6}

.qopt:hover{background:#f5f5f5}
.qopt.correct{background:#e8f5e9;color:#1a4731;border-color:#a5d6a7;font-weight:500}

}

<body>
<div class="app">
  <h1>⚛️ Physik-Lernplan – Atome &amp; Wärmelehre</h1>
  <p class="subtitle">Klasse 9 Gymnasium Bayern &nbsp;·&nbsp; Schulaufgabe: Di, 30.06.2026 &nbsp;·&nbsp; 45 min/Tag</p>

  <div class="countdown" id="countdown">📅 Berechne...</div>

  <div class="tab-bar">
    <button class="tab active" onclick="showPanel('plan',this)">📅 Lernplan</button>
    <button class="tab" onclick="showPanel('summary',this)">📚 Zusammenfassung</button>
    <button class="tab" onclick="showPanel('uebungen',this)">✏️ Übungen</button>
    <button class="tab" onclick="showPanel('quiz',this)">⭐ Quiz</button>
  </div>

  <div class="panel active" id="panel-plan">
    <div class="prog-wrap">
      <div class="prog-label"><span id="prog-label">0 von 8 Einheiten erledigt</span><span id="prog-pct">0%</span></div>
      <div class="prog-bar"><div class="prog-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div id="days-container"></div>
  </div>

  <div class="panel" id="panel-summary">
    <div id="topics-container"></div>
  </div>

  <div class="panel" id="panel-uebungen">
    <div id="exercises-container"></div>
  </div>

  <div class="panel" id="panel-quiz">
    <div id="quiz-container">
      <div class="quiz-card">
        <div class="quiz-meta">
          <span id="q-counter">Frage 1 von 16</span>
          <span id="q-topic-badge" class="quiz-topic">Atome</span>
          <span id="q-score">0 richtig</span>
        </div>
        <div class="quiz-q" id="q-text"></div>
        <div class="quiz-opts" id="q-opts"></div>
        <div class="q-fb" id="q-fb"></div>
        <div class="quiz-nav"><button class="next-btn" onclick="nextQ()">Weiter →</button></div>
      </div>
    </div>
    <div class="score-box" id="score-box" style="display:none">
      <div class="score-big" id="score-num"></div>
      <div class="score-label" id="score-pct"></div>
      <div class="score-msg" id="score-msg"></div>
      <button class="restart-btn" onclick="restartQuiz()">↺ Nochmal versuchen</button>
    </div>
  </div>
</div>

<script>
const DAYS = [
  {date:"So, 21.06.",th:"III.1 + III.2",title:"Atome – Photonenmodell & Energiestufen",sessions:[
    {type:"lern",time:"0–15 min",text:"Photonenmodell: Licht besteht aus Photonen, E = h·f. Emission & Absorption verstehen."},
    {type:"pause",time:"15–18 min",text:"Pause – kurz aufstehen & trinken!"},
    {type:"lern",time:"18–33 min",text:"Energiestufenmodell: Grundzustand, angeregte Zustände, Übergänge → Spektrallinien."},
    {type:"quiz",time:"33–45 min",text:"Quiz-Tab: Fragen zu Atome (III.1 & III.2) durcharbeiten."}
  ]},
  {date:"Mo, 22.06.",th:"IV.1 + IV.2",title:"Materie & innere Energie, Wärmeübertragung",sessions:[
    {type:"lern",time:"0–15 min",text:"IV.1: Atome/Moleküle in Bewegung → innere Energie U = kinetische + potenzielle Energie der Teilchen."},
    {type:"pause",time:"15–18 min",text:"Pause"},
    {type:"lern",time:"18–33 min",text:"IV.2: Wärmeleitung, Konvektion, Wärmestrahlung – Unterschiede & Beispiele."},
    {type:"aufg",time:"33–45 min",text:"Übungen-Tab: Aufgabe 1 & 2 lösen (Energie & Wärmeübertragung)."}
  ]},
  {date:"Di, 23.06.",th:"IV.3",title:"Änderung der inneren Energie – Formeln",sessions:[
    {type:"lern",time:"0–18 min",text:"Q = m · c · ΔT auswendig lernen + anwenden. Spezifische Wärmekapazität c verstehen."},
    {type:"pause",time:"18–21 min",text:"Pause"},
    {type:"aufg",time:"21–38 min",text:"Übungen-Tab: Aufgabe 3 & 4 – Rechenaufgaben Q = m·c·ΔT mit Zahlen lösen."},
    {type:"quiz",time:"38–45 min",text:"Quiz: Wärmelehre-Fragen – IV.3 testen."}
  ]},
  {date:"Mi, 24.06.",th:"IV.4",title:"Aggregatzustandswechsel",sessions:[
    {type:"lern",time:"0–15 min",text:"Schmelzen, Erstarren, Verdampfen, Kondensieren, Sublimation. Schmelz- & Verdampfungswärme: Q = m · L."},
    {type:"pause",time:"15–18 min",text:"Pause"},
    {type:"lern",time:"18–33 min",text:"Plateaus im T-t-Diagramm erklären können. Warum bleibt Temperatur beim Phasenübergang konstant?"},
    {type:"aufg",time:"33–45 min",text:"Übungen-Tab: Aufgabe 5 – T-t-Diagramm beschriften & Aufgabe 6 – Q = m·L Rechnung."}
  ]},
  {date:"Do, 25.06.",th:"IV.5",title:"Druck in Gasen",sessions:[
    {type:"lern",time:"0–15 min",text:"Druck p = F/A (in Pascal). Boyle-Mariotte: p·V = const (bei T=const). Gasgesetze."},
    {type:"pause",time:"15–18 min",text:"Pause"},
    {type:"aufg",time:"18–33 min",text:"Übungen-Tab: Aufgabe 7 & 8 – Druck berechnen, p·V = const anwenden."},
    {type:"quiz",time:"33–45 min",text:"Quiz komplett durchlaufen – alle Themen testen."}
  ]},
  {date:"Fr, 26.06.",th:"Alle Themen",title:"Formel-Training & Rechenaufgaben",sessions:[
    {type:"wdh",time:"0–15 min",text:"Alle Formeln auf einen Zettel schreiben: E=h·f, Q=m·c·ΔT, Q=m·L, p=F/A, p·V=const."},
    {type:"pause",time:"15–18 min",text:"Pause"},
    {type:"aufg",time:"18–38 min",text:"Übungen-Tab: Aufgaben 3–8 nochmals lösen – diesmal ohne Lösung schauen!"},
    {type:"quiz",time:"38–45 min",text:"Quiz: Ziel 12/16 oder mehr erreichen."}
  ]},
  {date:"Sa, 27.06.",th:"Alle Themen",title:"leifiphysik.de + Selbsttest",sessions:[
    {type:"wdh",time:"0–20 min",text:"leifiphysik.de → Atome → Photonenmodell + Energiestufen: Selbsttest & Aufgaben machen."},
    {type:"pause",time:"20–23 min",text:"Pause"},
    {type:"wdh",time:"23–45 min",text:"leifiphysik.de → Wärmelehre → Aufgaben zu Q=m·c·ΔT, Aggregatzustand, Druck lösen."}
  ]},
  {date:"Mo, 29.06.",th:"FINAL",title:"Letzte Wiederholung – Generalprobe",sessions:[
    {type:"wdh",time:"0–15 min",text:"Schwache Stellen aus Quiz nochmal in der Zusammenfassung nachlesen."},
    {type:"pause",time:"15–18 min",text:"Pause"},
    {type:"wdh",time:"18–35 min",text:"Alle Formeln nochmal aufschreiben + je 1 Rechenbeispiel pro Formel."},
    {type:"wdh",time:"35–45 min",text:"Früh ins Bett! Ausgeruht in die Prüfung. Viel Erfolg! 🎯"}
  ]},
];

const TOPICS = [
  {tag:"atom-tag",tagLabel:"III.1",title:"Photonenmodell",keys:["kw-a"],kws:["Photon","E = h·f","Emission","Absorption","Planck","Lichtquant"],
  must:"Formel E = h·f MUSS sitzen! h = 6,626·10⁻³⁴ J·s",
  body:`<ul>
<li><strong>Licht besteht aus Photonen</strong> (Lichtquanten) – diskrete Energiepakete, keine Wellen.</li>
<li><strong>Energie eines Photons:</strong> E = h · f &nbsp;(h = Plancksches Wirkungsquantum, f = Frequenz)</li>
<li><strong>Emission:</strong> Atom gibt Energie ab → sendet Photon aus (Elektron fällt auf niedrigere Stufe).</li>
<li><strong>Absorption:</strong> Atom nimmt Energie auf → Photon wird verschluckt (Elektron springt auf höhere Stufe).</li>
<li><strong>Nur bestimmte Energien:</strong> Ein Atom kann nur Photonen absorbieren/emittieren, deren Energie genau dem Stufenunterschied entspricht → diskrete Spektrallinien.</li>
<li><strong>Photoeffekt:</strong> Photon trifft Metall → Elektron wird herausgeschlagen (wenn E ≥ Austrittsarbeit).</li>
</ul>
<div class="formula-box">E = h · f &nbsp;&nbsp; (E in Joule [J], h = 6,626·10⁻³⁴ J·s, f in Hz)</div>`,
  tip:"Frequenz f und Wellenlänge λ: c = f·λ → f = c/λ (c = 3·10⁸ m/s)"},

  {tag:"atom-tag",tagLabel:"III.2",title:"Energiestufenmodell",keys:["kw-a"],kws:["Grundzustand","angeregte Zustände","Ionisation","Spektrallinie","Übergang","eV"],
  must:"Übergänge im Diagramm einzeichnen und Energie berechnen können!",
  body:`<ul>
<li><strong>Grundzustand:</strong> niedrigste Energiestufe – Elektron ist stabil (E₁, meist negativ angegeben).</li>
<li><strong>Angeregte Zustände:</strong> höhere Energiestufen E₂, E₃, ... – Elektron wurde angeregt (z.B. durch Wärmezufuhr oder Lichtabsorption).</li>
<li><strong>Ionisationsenergie:</strong> Energie, um Elektron vollständig zu entfernen (E = 0 eV).</li>
<li><strong>Übergang nach unten:</strong> Atom emittiert Photon mit E = E_oben − E_unten.</li>
<li><strong>Übergang nach oben:</strong> Atom absorbiert Photon mit genau dieser Energie.</li>
<li><strong>Spektrallinien:</strong> Jedes Element hat einzigartiges Linienspektrum → Fingerabdruck des Atoms.</li>
<li><strong>Einheit:</strong> Energie oft in Elektronenvolt [eV]: 1 eV = 1,6·10⁻¹⁹ J</li>
</ul>
<div class="formula-box">ΔE = E₂ − E₁ = h · f &nbsp;&nbsp; → Wellenlänge: λ = h·c / ΔE</div>`,
  tip:"Im Diagramm: Pfeil nach unten = Emission (Photon raus), Pfeil nach oben = Absorption (Photon rein)."},

  {tag:"waerm-tag",tagLabel:"IV.1",title:"Materie & innere Energie",keys:["kw-w"],kws:["innere Energie","Teilchenbewegung","kinetisch","potenziell","Temperatur","kBoltzmann"],
  must:"Innere Energie U = Summe aller kinetischen + potenziellen Energien der Teilchen.",
  body:`<ul>
<li><strong>Alle Materie</strong> besteht aus Atomen/Molekülen in ständiger ungeordneter Bewegung.</li>
<li><strong>Innere Energie U</strong> = Summe der kinetischen Energie (Bewegung) + potenziellen Energie (Anziehung) aller Teilchen.</li>
<li><strong>Temperatur T</strong> ist ein Maß für die mittlere kinetische Energie der Teilchen: höhere T → schnellere Teilchen.</li>
<li><strong>Absoluter Nullpunkt:</strong> 0 Kelvin = −273,15 °C → Teilchen ruhen, U = Minimum.</li>
<li><strong>Umrechnung:</strong> T [K] = T [°C] + 273,15</li>
<li>Bei Feststoffen: Teilchen schwingen um feste Plätze. Bei Flüssigkeiten: gleiten aneinander. Bei Gasen: fliegen frei.</li>
</ul>
<div class="formula-box">T [K] = ϑ [°C] + 273,15 &nbsp;&nbsp; E_kin,Mittel ~ T</div>`,
  tip:"Temperaturerhöhung → mehr kinetische Energie → größere innere Energie."},

  {tag:"waerm-tag",tagLabel:"IV.2",title:"Wärme & Übertragung",keys:["kw-w"],kws:["Wärmeleitung","Konvektion","Strahlung","Wärmemenge Q","Gleichgewicht"],
  must:"3 Arten der Wärmeübertragung mit Beispielen nennen können!",
  body:`<ul>
<li><strong>Wärmeleitung:</strong> Energie wird durch direkten Kontakt von Teilchen zu Teilchen weitergegeben. Kein Materialtransport. Beispiel: Metallstab im Feuer.</li>
<li><strong>Konvektion (Wärmeströmung):</strong> Warme Materie steigt auf, kühle sinkt ab → Kreislauf. Nur in Flüssigkeiten & Gasen. Beispiel: Heizung erwärmt Raumluft.</li>
<li><strong>Wärmestrahlung:</strong> Energie wird als elektromagnetische Strahlung (Infrarot) übertragen. Braucht kein Medium. Beispiel: Sonnenwärme, Lagerfeuer.</li>
<li><strong>Wärmemenge Q:</strong> Energie, die als Wärme übertragen wird (Einheit: Joule [J]).</li>
<li><strong>Thermisches Gleichgewicht:</strong> Wärme fließt immer von warm nach kalt, bis T₁ = T₂.</li>
</ul>`,
  tip:"Vakuum (Weltall): nur Strahlung möglich! Thermosflasche: alle 3 Arten werden blockiert."},

  {tag:"waerm-tag",tagLabel:"IV.3",title:"Änderung der inneren Energie",keys:["kw-w"],kws:["Q = m·c·ΔT","spez. Wärmekapazität","c","ΔT","Kalorimeter"],
  must:"Q = m · c · ΔT ist die WICHTIGSTE Formel – auswendig lernen und anwenden!",
  body:`<ul>
<li><strong>Zugeführte Wärmemenge Q</strong> ändert die innere Energie und damit die Temperatur.</li>
<li><strong>Formel:</strong> Q = m · c · ΔT</li>
<li>m = Masse in kg, c = spezifische Wärmekapazität in J/(kg·K), ΔT = Temperaturänderung in K oder °C</li>
<li><strong>Spezifische Wärmekapazität c</strong> gibt an, wie viel Energie nötig ist, um 1 kg des Stoffes um 1 K zu erwärmen.</li>
<li>Wichtige Werte: Wasser c = 4180 J/(kg·K), Eisen c ≈ 450 J/(kg·K), Luft c ≈ 1005 J/(kg·K).</li>
<li><strong>Kalorimeter:</strong> Gerät zum Messen von Wärmemengen (thermisch isoliert).</li>
</ul>
<div class="formula-box">Q = m · c · ΔT &nbsp;&nbsp; | &nbsp;&nbsp; ΔT = Q / (m·c) &nbsp;&nbsp; | &nbsp;&nbsp; m = Q / (c·ΔT)</div>`,
  tip:"Wasser hat sehr hohe Wärmekapazität → deshalb als Kühlmittel und Heizungswasser ideal."},

  {tag:"waerm-tag",tagLabel:"IV.4",title:"Aggregatzustandswechsel",keys:["kw-w"],kws:["Schmelzen","Verdampfen","Kondensieren","Erstarren","Q = m·L","Plateau"],
  must:"T-t-Diagramm erklären + Q = m·L anwenden können!",
  body:`<ul>
<li><strong>4 Zustände:</strong> fest → flüssig (Schmelzen) → gasförmig (Verdampfen) / und zurück.</li>
<li><strong>Beim Phasenübergang:</strong> Temperatur bleibt konstant! (Plateau im T-t-Diagramm) → zugeführte Energie bricht Bindungen auf.</li>
<li><strong>Schmelzwärme (Fusionswärme):</strong> Q = m · Ls &nbsp;(Ls = spez. Schmelzwärme, Wasser: 334 kJ/kg)</li>
<li><strong>Verdampfungswärme:</strong> Q = m · Lv &nbsp;(Lv = spez. Verdampfungswärme, Wasser: 2257 kJ/kg)</li>
<li><strong>T-t-Diagramm Wasser:</strong> Anstieg (Erwärmen Eis) → Plateau bei 0°C (Schmelzen) → Anstieg (Erwärmen Wasser) → Plateau bei 100°C (Verdampfen).</li>
<li><strong>Umkehrvorgänge:</strong> Kondensation gibt Energie ab, Erstarren gibt Energie ab.</li>
</ul>
<div class="formula-box">Q = m · L &nbsp;&nbsp; (L = spez. Schmelz- oder Verdampfungswärme in J/kg)</div>`,
  tip:"Verdampfung braucht viel mehr Energie als Schmelzen (Lv >> Ls) → deshalb verbrennt Dampf so stark!"},

  {tag:"waerm-tag",tagLabel:"IV.5",title:"Druck in Gasen",keys:["kw-w"],kws:["p = F/A","Pascal","Boyle-Mariotte","p·V=const","Gasgesetz","Atmosphäre"],
  must:"p = F/A und p·V = const (Boyle-Mariotte) auswendig + Aufgaben lösen können!",
  body:`<ul>
<li><strong>Druck p</strong> = Kraft pro Fläche: p = F / A (Einheit: Pascal [Pa] = N/m²)</li>
<li><strong>Normaldruck:</strong> p₀ = 101.325 Pa ≈ 1 bar = 1 atm.</li>
<li><strong>Druck in Gasen:</strong> Gasteilchen stoßen gegen Wände → üben Druck aus. Mehr Teilchen / höhere T → größerer Druck.</li>
<li><strong>Boyle-Mariotte-Gesetz:</strong> Bei konstanter Temperatur: p · V = const</li>
<li>→ Doppelter Druck = halbes Volumen, und umgekehrt.</li>
<li><strong>Gay-Lussac:</strong> Bei konstantem Volumen: p / T = const (p steigt mit T).</li>
<li><strong>Allgemeines Gasgesetz:</strong> p · V / T = const</li>
</ul>
<div class="formula-box">p = F / A &nbsp;&nbsp; | &nbsp;&nbsp; p₁ · V₁ = p₂ · V₂ &nbsp;&nbsp; | &nbsp;&nbsp; p₁/T₁ = p₂/T₂</div>`,
  tip:"Einheiten immer prüfen: Druck in Pa, Volumen in m³, Temperatur in Kelvin!"},
];

let doneDays = new Set();
let qIdx=0, score=0, answered=false, shuffled=[];

function showPanel(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('panel-'+id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function updateCountdown(){
  const exam=new Date('2026-06-30T08:00:00');
  const now=new Date();
  const diff=Math.ceil((exam-now)/(1000*60*60*24));
  const el=document.getElementById('countdown');
  if(diff>0) el.textContent='📅 Noch '+diff+' Tag'+(diff===1?'':'e')+' bis zur Physik-Schulaufgabe (Di, 30.06.2026)';
  else if(diff===0) el.textContent='🎯 Heute ist die Schulaufgabe – viel Erfolg!';
  else{el.style.background='#e8f5e9';el.style.color='#1a4731';el.style.borderColor='#a5d6a7';el.textContent='✓ Die Schulaufgabe ist vorbei!';}
}

function buildDays(){
  const c=document.getElementById('days-container');
  DAYS.forEach((d,i)=>{
    const div=document.createElement('div');
    div.className='day-card';
    const sess=d.sessions.map(s=>`<div class="session"><span class="stime">${s.time}</span><span class="sblock ${s.type}">${s.text}</span></div>`).join('');
    div.innerHTML=`<div class="day-header">
      <span class="badge b-date">${d.date}</span>
      <span class="badge b-th">${d.th}</span>
      <span class="day-title">${d.title}</span>
      <button class="done-btn" id="done-${i}" onclick="markDone(${i})">✓ Erledigt</button>
    </div>${sess}`;
    c.appendChild(div);
  });
  const exam=document.createElement('div');
  exam.className='day-card';
  exam.innerHTML=`<div class="day-header"><span class="badge b-exam">Di, 30.06.</span><span class="day-title" style="font-weight:600;color:#9B1C1C">🎯 SCHULAUFGABE – Physik Klasse 9</span></div><div class="session"><span class="stime">Schule</span><span class="sblock lern">Formeln sitzen, Kopf ist frei – du schaffst das!</span></div>`;
  c.appendChild(exam);
}

function markDone(i){
  const btn=document.getElementById('done-'+i);
  if(doneDays.has(i)){doneDays.delete(i);btn.classList.remove('done');btn.textContent='✓ Erledigt';}
  else{doneDays.add(i);btn.classList.add('done');btn.textContent='✓ Fertig!';}
  const pct=Math.round(doneDays.size/DAYS.length*100);
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('prog-label').textContent=doneDays.size+' von '+DAYS.length+' Einheiten erledigt';
  document.getElementById('prog-pct').textContent=pct+'%';
}

function buildTopics(){
  const c=document.getElementById('topics-container');
  TOPICS.forEach((t,i)=>{
    const div=document.createElement('div');
    div.className='topic-card';
    const kws=t.kws.map(k=>`<span class="kw ${t.keys[0]}">${k}</span>`).join('');
    div.innerHTML=`<div class="topic-hdr" onclick="toggleTopic(${i})">
      <span class="th-tag ${t.tag}">${t.tagLabel}</span>
      <span class="ttitle">${t.title}</span>
      <span class="chev" id="chev-${i}">▸</span>
    </div>
    <div class="topic-body" id="tbody-${i}">
      <div class="must-box">⚠️ Muss können: ${t.must}</div>
      <div class="kw-wrap" style="margin-top:10px">${kws}</div>
      ${t.body}
      <div class="tip-box">💡 Tipp: ${t.tip}</div>
    </div>`;
    c.appendChild(div);
  });
}

function toggleTopic(i){
  const b=document.getElementById('tbody-'+i);
  const ch=document.getElementById('chev-'+i);
  b.classList.toggle('open');
  ch.textContent=b.classList.contains('open')?'▾':'▸';
}

function buildExercises(){
  const c=document.getElementById('exercises-container');
  EXERCISES.forEach((e,i)=>{
    const div=document.createElement('div');
    div.className='ex-card';
    div.innerHTML=`<div class="ex-num">Aufgabe ${e.num} &nbsp;·&nbsp; Thema ${e.th}</div>
      <div class="ex-q">${e.q}</div>
      <div class="ex-hint">💡 Tipp: ${e.hint}</div>
      <button class="show-btn" onclick="toggleAns(${i},this)">Musterlösung anzeigen</button>
      <div class="answer" id="ans-${i}"><strong>Musterlösung:</strong><br><br>${e.ans}</div>`;
    c.appendChild(div);
  });
}

function toggleAns(i,btn){
  const a=document.getElementById('ans-'+i);
  a.classList.toggle('open');
  btn.textContent=a.classList.contains('open')?'Musterlösung verbergen':'Musterlösung anzeigen';
}

function shuffle(arr){return arr.slice().sort(()=>Math.random()-0.5);}
function initQuiz(){shuffled=shuffle(QUIZ);qIdx=0;score=0;answered=false;renderQ();}

function renderQ(){
  if(qIdx>=shuffled.length){showScore();return;}
  const q=shuffled[qIdx];
  document.getElementById('q-text').textContent=q.q;
  document.getElementById('q-counter').textContent='Frage '+(qIdx+1)+' von '+shuffled.length;
  document.getElementById('q-score').textContent=score+' richtig';
  const badge=document.getElementById('q-topic-badge');
  badge.textContent=q.t;
  badge.style.background=q.t==='Atome'?'#ede9fe':'#fef3e2';
  badge.style.color=q.t==='Atome'?'#5b21b6':'#854F0B';
  document.getElementById('q-fb').textContent='';
  answered=false;
  const opts=document.getElementById('q-opts');
  opts.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='qopt';b.textContent=o;
    b.onclick=()=>selectOpt(i,b,q.a);
    opts.appendChild(b);
  });
}

function selectOpt(i,btn,correct){
  if(answered)return;answered=true;
  document.querySelectorAll('.qopt').forEach(o=>o.disabled=true);
  if(i===correct){btn.classList.add('correct');score++;document.getElementById('q-fb').textContent='✓ Richtig!';}
  else{btn.classList.add('wrong');document.querySelectorAll('.qopt')[correct].classList.add('correct');document.getElementById('q-fb').textContent='✗ Leider falsch – richtige Antwort ist grün markiert.';}
  document.getElementById('q-score').textContent=score+' richtig';
}

function nextQ(){qIdx++;renderQ();}

function showScore(){
  document.getElementById('quiz-container').style.display='none';
  document.getElementById('score-box').style.display='block';
  const pct=Math.round(score/shuffled.length*100);
  document.getElementById('score-num').textContent=score+'/'+shuffled.length;
  document.getElementById('score-pct').textContent=pct+'% korrekt';
  let msg;
  if(pct>=87) msg='🎉 Ausgezeichnet! Top vorbereitet!';
  else if(pct>=70) msg='👍 Gut! Noch 1–2 Formeln wiederholen.';
  else if(pct>=55) msg='📖 Weiter üben – Zusammenfassung nochmal lesen!';
  else msg='💪 Nicht aufgeben – nochmal von vorne!';
  document.getElementById('score-msg').textContent=msg;
}

function restartQuiz(){
  document.getElementById('quiz-container').style.display='';
  document.getElementById('score-box').style.display='none';
  initQuiz();
}

updateCountdown();
buildDays();
buildTopics();
buildExercises();
initQuiz();
</script>
</body>
</html>
